<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuckle Dev Verification Gate</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg-color:#030611;
    --bg-color-2:#090d22;
    --text:#f8fafc;
    --muted:#94a3b8;
    --blue:#00d9ff;
    --orange:#ff7b00;
    --yellow:#ffd000;
    --glass:rgba(255,255,255,0.03);
    --border:rgba(255,255,255,0.06);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter;
    background:linear-gradient(180deg,var(--bg-color),var(--bg-color-2));
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    width:100%;
    max-width:700px;
    background:var(--glass);
    border:1px solid var(--border);
    backdrop-filter:blur(15px);
    border-radius:18px;
    padding:35px;
}

.section-title{
    font-family:Orbitron;
    text-align:center;
    font-size:2rem;
    margin-bottom:20px;
    background:linear-gradient(90deg,#fff,var(--blue),#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{color:var(--muted);line-height:1.6;margin-bottom:15px;}

.highlight-box{
    border-left:3px solid var(--blue);
    padding:12px;
    background:rgba(0,217,255,0.05);
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    background:rgba(0,0,0,0.3);
    border:1px solid var(--border);
    border-radius:8px;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-family:Orbitron;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.btn{
    background:linear-gradient(135deg,var(--orange),var(--yellow));
    color:black;
    font-weight:900;
}

.btn:hover{transform:translateY(-2px);}

.engine-btn{
    background:rgba(255,255,255,0.02);
    border:1px solid var(--border);
    color:white;
    text-align:left;
}

.engine-btn:hover{
    border-color:var(--blue);
    color:var(--blue);
}

.option{
    display:block;
    padding:12px;
    margin:8px 0;
    border:1px solid var(--border);
    border-radius:8px;
    cursor:pointer;
}

.hidden{display:none;}

.step-indicator{
    float:right;
    color:var(--blue);
}
</style>
</head>

<body>

<div class="card" id="quiz-wrapper">

<!-- STEP 1 -->
<div id="step-identity">
<h2 class="section-title">CHUCKLE GATE</h2>

<p>Developer verification system for game creators.</p>

<div class="highlight-box">
<p><b>Goal:</b> Test engine knowledge and skill level.</p>
</div>

<input id="username" placeholder="Discord username">

<button class="btn" onclick="nextStep()">PROCEED</button>
</div>

<!-- STEP 2 -->
<div id="step-engine" class="hidden">
<h2 class="section-title">SELECT ENGINE</h2>

<button class="engine-btn" onclick="selectEngine('unity')">Unity</button>
<button class="engine-btn" onclick="selectEngine('unreal')">Unreal</button>
<button class="engine-btn" onclick="selectEngine('godot')">Godot</button>
</div>

<!-- STEP 3 -->
<div id="step-questions" class="hidden">
<span class="step-indicator" id="progress"></span>
<h2 class="section-title">QUIZ</h2>

<div id="qbox"></div>

<button class="btn" onclick="submit()">SUBMIT</button>
</div>

</div>

<script>

const db = {
unity:[
{q:"Best render pipeline?",o:["URP","HDRP","Built-in","2D"],a:1},
{q:"Profiler used for?",o:["Audio","Performance","UI","Input"],a:1},
{q:"Time.deltaTime means?",o:["Frame time","CPU","GPU","Memory"],a:0},
{q:"Collider vs Rigidbody?",o:["Same","Physics vs shape","Audio","UI"],a:1},
{q:"Awake vs Start?",o:["Same","Init timing difference","GPU","None"],a:1},
{q:"Coroutine does?",o:["Freeze","Multi-frame execution","Delete","Compile"],a:1},
{q:"FixedUpdate used for?",o:["UI","Physics","Audio","Shaders"],a:1},
{q:"NullReference means?",o:["Missing object","GPU error","Crash","Input"],a:0},
{q:"Occlusion culling?",o:["Hide unseen objects","Lighting","Audio","UI"],a:0},
{q:"DeltaTime purpose?",o:["Frame consistency","Speed","Memory","Texture"],a:0}
],
unreal:[
{q:"GameModeBase?",o:["Rules","Shaders","Audio","UI"],a:0},
{q:"Nanite?",o:["UI","High poly rendering","Audio","Input"],a:1},
{q:"Lumen?",o:["Lighting","AI","Physics","UI"],a:0},
{q:"Blueprint Pure?",o:["No exec pins","Always runs","Deletes","UI"],a:0},
{q:"PlayerController?",o:["Input system","Audio","UI","Physics"],a:0},
{q:"Cooking assets?",o:["Optimize build","Increase size","Debug","Render"],a:0},
{q:"Cast To?",o:["Type check","Render","Move","Delete"],a:0},
{q:"Level Instance?",o:["Reusable level","Audio","UI","Input"],a:0},
{q:"UPROPERTY?",o:["Expose to editor","Delete","Render","None"],a:0},
{q:"Lumen handles?",o:["Lighting","UI","Audio","Save"],a:0}
],
godot:[
{q:"Scene system?",o:["Node tree","Array","DB","UI"],a:0},
{q:"GridMap?",o:["3D tiles","Audio","UI","Physics"],a:0},
{q:"Transform?",o:["Position","Audio","Memory","Input"],a:0},
{q:"Viewport?",o:["Render window","Audio","UI","CPU"],a:0},
{q:"Signals?",o:["Events","Shaders","Physics","UI"],a:0},
{q:"_ready?",o:["Init","Loop","Delete","Render"],a:0},
{q:"queue_free?",o:["Delete node","Freeze","Copy","Render"],a:0},
{q:"Input Map?",o:["Key binding","Audio","UI","Memory"],a:0},
{q:"_physics_process?",o:["Physics loop","UI","Audio","Render"],a:0},
{q:"@onready?",o:["Delayed init","Delete","Render","Input"],a:0}
]
};

let user="",engine="",i=0,score=0;

window.nextStep=function(){
    const u=document.getElementById("username").value.trim();
    if(!u)return alert("Enter username");
    user=u;
    step("step-identity","step-engine");
};

window.selectEngine=function(e){
    engine=e;
    i=0;score=0;
    step("step-engine","step-questions");
    render();
};

function render(){
    const q=db[engine][i];
    document.getElementById("progress").innerText=`${i+1}/10`;

    let html=`<h3>${q.q}</h3>`;
    q.o.forEach((o,idx)=>{
        html+=`<label class="option">
        <input type="radio" name="a" value="${idx}"> ${o}
        </label>`;
    });

    document.getElementById("qbox").innerHTML=html;
}

window.submit=function(){
    const sel=document.querySelector('input[name="a"]:checked');
    if(!sel)return alert("Select answer");

    if(parseInt(sel.value)===db[engine][i].a)score++;

    i++;
    if(i>=10)return finish();
    render();
};

function finish(){
    const pass = score >= 6;

    // 🔥 DISCORD WEBHOOK URL (PUT YOUR LINK HERE)
    const webhookUrl = "https://discord.com/api/webhooks/1506694511894466614/F-aK7eQ12dXTzNEr6OTzEPCOqk1owQW8o1whN1i64ziaJHDm5eygQXdfJ-k_0uCH3THD";

    // 📦 DATA SENT TO DISCORD
    const payload = {
        embeds: [{
            title: pass ? "🟢 PASSED" : "🔴 FAILED",
            color: pass ? 65280 : 16711680,
            fields: [
                { name: "User", value: user, inline: true },
                { name: "Engine", value: engine, inline: true },
                { name: "Score", value: `${score}/10`, inline: true }
            ],
            timestamp: new Date()
        }]
    };

    // 🚀 SEND TO DISCORD
    fetch(webhookUrl, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    // 🎯 SHOW RESULT ON PAGE
    document.getElementById("quiz-wrapper").innerHTML =
        pass
        ? `<h2 class="section-title">PASSED</h2><p>${user} scored ${score}/10</p>`
        : `<h2 class="section-title">FAILED</h2><p>${score}/10</p>`;
}

function step(a,b){
    document.getElementById(a).classList.add("hidden");
    document.getElementById(b).classList.remove("hidden");
}

</script>

</body>
</html>
